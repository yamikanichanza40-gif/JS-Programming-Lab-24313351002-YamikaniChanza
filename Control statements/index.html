<!DOCTYPE html>
<html>
<head>
    <title>Control Statements</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> Interactive JavaScript Control Statements</h1>

    <div>
        <h3>Check if you're an adult</h3>
        <input type="number" id="age" placeholder="Enter your age">
        <button onclick="checkAge()">Check Age</button>
        <p id="ageResult"></p>
    </div>

    <hr>

    <div>
        <h3>Check temperature status</h3>
        <input type="number" id="temp" placeholder="Enter temperature">
        <button onclick="checkTemp()">Check Temperature</button>
        <p id="tempResult"></p>
    </div>

    <hr>

    <div>
        <h3>Count number up to</h3>
        <input type="number" id="countNum" placeholder="Enter a number">
        <button onclick="startCount()">Run Loop</button>
        <p id="countResult"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
